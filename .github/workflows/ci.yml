name: CI

# Two jobs:
#  * build — every push/PR: builds the sdist + wheel, validates the
#    distribution metadata (catches the MIT license fields, missing
#    package-data, bad long-description), installs the wheel into a clean
#    env, and confirms the `knowledge` entry point imports and runs.
#  * test — pushes to main only (i.e. when a merge lands): runs the pytest
#    suite. The Docker-backed shared-PG harness (`-m integration`) is
#    deselected — CI runners have Docker, so without the filter a plain
#    pytest run would launch the full 15-minute end-to-end scenario; it
#    stays a local/manual tool (`pytest -m integration`).

on:
  push:
    branches: [main, devel]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check dist/*

      - name: Smoke-install the wheel
        run: pip install dist/*.whl

      - name: Verify CLI entry point
        run: knowledge --help

      - name: Upload distributions
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: dist
          path: dist/*

  test:
    # Runs only when a merge (push) lands on main — not on PRs or devel.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package with test + postgres extras
        # postgres extra: several unit tests exercise the psycopg/pgvector
        # code paths with mocks but import the real modules.
        run: pip install -e '.[dev,postgres]'

      - name: Run test suite
        run: python -m pytest tests/ -m "not integration" -q
