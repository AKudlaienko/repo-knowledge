# .knowledge.yaml — knowledge CLI runtime config.
#
# Same file name and same schema at every scope. Resolution walks up from
# cwd to filesystem root and uses the first .knowledge.yaml found; if the
# walk runs out, it falls back to $HOME/.knowledge.yaml. The closest file
# wins, so a project file in a repo overrides a global one in your home.
#
#   ~/.knowledge.yaml                       <- laptop default
#   <repo-root>/.knowledge.yaml             <- per-project override
#   <repo-root>/subdir/.knowledge.yaml      <- (rare) deeper override
#
# Commit policy is up to you per-repo: commit it for team alignment, or
# gitignore it for per-developer choice. Don't be surprised either way.
#
# Credentials never go in this file — only env-var NAMES. Actual values
# come from os.environ at connect time (see knowledge/config.example.env
# for the matching shell exports).

storage:
  # "sqlite" (laptop-only, default) | "shared_postgresql" (team-shared PG)
  mode: sqlite

  # Block is read only when mode = shared_postgresql. Safe to keep here
  # while staying on sqlite — it's just future config waiting to be turned
  # on with a one-line mode flip.
  postgresql:
    host: db.example.com
    port: 5432
    database: knowledge
    sslmode: require              # set to "disable" for local Docker dev
    user_env: KNOWLEDGE_PG_USER
    password_env: KNOWLEDGE_PG_PASSWORD
    connect_timeout_seconds: 10

# Optional: bytes of RAM the embedder is allowed to cache (default 2 GiB).
# cache_bytes: 2147483648

# Optional: override the embedding model name (default: BAAI/bge-small-en-v1.5).
# Changing this AFTER you've built any project triggers a forced rebuild
# next time `knowledge update` runs (vector dimensions / token model differ).
# embedding_model: null
