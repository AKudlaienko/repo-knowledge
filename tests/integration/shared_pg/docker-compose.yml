# Isolated pgvector instance for the shared-PostgreSQL integration test.
#
# Deliberately separate from `make pg-run`: different container name, host
# port (5433), and compose project (-p knowledge-itest) so it never collides
# with a developer's local dev DB. Data lives in the container writable layer
# only — `compose down` wipes everything; `stop`/`start` (used to simulate a
# connection drop) preserve it.
services:
  pg:
    build:
      context: ../../..        # repo root — reuses the shipped Dockerfile
      dockerfile: Dockerfile   # pgvector:pg17 + knowledge/schema/postgres/*.sql baked in
    image: repo-knowledge-pg-itest
    container_name: knowledge-pg-itest
    environment:
      POSTGRES_USER: ${KNOWLEDGE_PG_USER:-itest}
      POSTGRES_PASSWORD: ${KNOWLEDGE_PG_PASSWORD:-itestpw}
      POSTGRES_DB: knowledge
    ports:
      - "${ITEST_PG_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d knowledge"]
      interval: 2s
      timeout: 3s
      retries: 30
